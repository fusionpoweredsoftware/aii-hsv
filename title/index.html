<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Innovators of Huntsville</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../aiihsv-logo-complete-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #050510;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      --text-primary: #f0f0f5;
      --font-heading: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59, 130, 246, 0.12), transparent),
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(139, 92, 246, 0.08), transparent),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(6, 182, 212, 0.06), transparent);
      pointer-events: none;
    }

    .bg-grid::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .particle:nth-child(1) { left: 10%; width: 3px; height: 3px; background: var(--accent-blue); animation-duration: 18s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; width: 2px; height: 2px; background: var(--accent-purple); animation-duration: 22s; animation-delay: 3s; }
    .particle:nth-child(3) { left: 45%; width: 4px; height: 4px; background: var(--accent-cyan); animation-duration: 16s; animation-delay: 6s; }
    .particle:nth-child(4) { left: 65%; width: 2px; height: 2px; background: var(--accent-blue); animation-duration: 20s; animation-delay: 2s; }
    .particle:nth-child(5) { left: 80%; width: 3px; height: 3px; background: var(--accent-purple); animation-duration: 24s; animation-delay: 5s; }
    .particle:nth-child(6) { left: 90%; width: 2px; height: 2px; background: var(--accent-cyan); animation-duration: 19s; animation-delay: 8s; }

    /* Title content */
    .title-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 32px;
      display: block;
      margin: 0 auto 36px;
      object-fit: cover;
      object-position: center;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.3), 0 0 80px rgba(59, 130, 246, 0.15);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
    }

    h1 .gradient-text {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="title-content">
    <img src="../aiihsv-logo-complete.png" alt="AI Innovators of Huntsville" class="logo">
    <h1>
      <span class="gradient-text">AI Innovators</span><br>
      of Huntsville
    </h1>
  </div>
</body>
</html>
